<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Analyse Data Viz - Streaming</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

    <h1>Tableau de Bord du Streaming Mondial</h1>

    <div id="controls">
        <label for="platformSelect">Plateforme :</label>
        <select id="platformSelect"><option value="All">Toutes</option></select>

        <label for="countrySelect" style="margin-left: 20px;">Pays :</label>
        <select id="countrySelect"><option value="All">Tous</option></select>

        <label for="genreSelect" style="margin-left: 20px;">Genre :</label>
        <select id="genreSelect"><option value="All">Tous</option></select>
    </div>

    <div class="dashboard">
        <div id="line-chart"></div>
        <!-- Changement de l'ID ici -->
        <div id="donut-chart"></div>
    </div>

    <div style="margin-top: 50px; padding: 20px; background: #eee; border-radius: 8px;">
        <h3>Documentation brève</h3>
        <p>Ce projet visualise les tendances de sortie des catalogues de streaming mondiaux en utilisant <strong>D3.js</strong>.</p>
        <ul>
            <li><strong>Graphique de gauche :</strong> Évolution temporelle des sorties.</li>
            <!-- Changement de la description ici -->
            <li><strong>Graphique de droite :</strong> Répartition du Top 5 des genres (Donut Chart).</li>
        </ul>
    </div>

    <script src="main.js"></script>

</body>
</html>
